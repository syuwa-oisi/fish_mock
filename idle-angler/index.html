<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Idle Angler</title>
</head>
<body>
  <div id="widget">
    <div id="hudHover">
      <div class="chip">💰 <b id="hGold">0</b>G</div>
      <div class="chip">🎣 <b id="hCatch">0</b></div>
      <div class="chip" id="hWx">☀️ 昼・晴</div>
      <div class="chip buff" id="hBuff" style="display:none"></div>
    </div>
    <div id="fabs">
      <button class="fab" id="spdBtn" title="デモ用倍速">×1</button>
      <button class="fab" id="dockBtn" title="配置を切り替え">📌</button>
      <button class="fab" id="fabMenu" title="メニュー">☰<span id="fabBadge">0</span></button>
    </div>
    <canvas id="cv" width="424" height="200" data-tauri-drag-region></canvas>
    <div id="fx"></div>

    <div id="menu" class="pop">
      <button data-pop="box">🐟 魚箱 <small id="mBox"></small></button>
      <button data-pop="eq">🎣 装備</button>
      <button data-pop="skill">✨ スキル</button>
      <button data-pop="aq">🐠 水槽・図鑑</button>
      <button data-pop="mkt">🏪 市場</button>
      <button data-pop="set">⚙ 設定</button>
    </div>
    <div id="popup" class="pop">
      <header><span class="t" id="popTtl"></span><button class="x" id="popClose">✕</button></header>
      <div id="popBody"></div>
      <div id="log"></div>
    </div>
    <div id="toast"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
